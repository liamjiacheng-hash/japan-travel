    <rect x="466" y="232" width="154" height="56" rx="8" fill="#18a7a1"/>
    <rect x="710" y="188" width="118" height="96" rx="10" fill="#e75a8a"/>
    <rect x="928" y="252" width="170" height="56" rx="8" fill="#5fb9ff"/>
    <circle cx="344" cy="338" r="38" fill="#f4f0d0"/>
    <path d="M516 337c38-58 104-58 142 0-40 44-102 44-142 0z" fill="#ff7f32"/>
