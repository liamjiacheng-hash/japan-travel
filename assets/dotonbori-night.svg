<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Dotonbori at night</title>
  <desc id="desc">A stylized night view of Dotonbori with neon signs, canal reflections, and Osaka storefronts.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172a46"/>
      <stop offset="1" stop-color="#07111d"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123d55"/>
      <stop offset="1" stop-color="#07131f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <circle cx="1010" cy="100" r="52" fill="#f6d889" opacity=".9"/>
  <path d="M0 454h1200v346H0z" fill="url(#water)"/>
  <path d="M0 431c150 20 260-28 405-10 168 20 272 70 429 34 151-35 242-14 366 21v56H0z" fill="#273244"/>
